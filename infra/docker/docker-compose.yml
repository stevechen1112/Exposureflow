services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: exposureflow
      POSTGRES_PASSWORD: exposureflow
      POSTGRES_DB: exposureflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
