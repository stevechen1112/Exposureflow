[project]
name = "exposureflow-execution-adapters"
version = "0.1.0"
description = "Execution adapters — WordPress, ForgeBase, content engines, publish gate"
requires-python = ">=3.11"
dependencies = ["httpx>=0.28.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["execution_adapters"]
