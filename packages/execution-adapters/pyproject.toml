[project]
name = "exposureflow-execution-adapters"
version = "0.1.0"
description = "Execution adapters — WordPress, ForgeBase, content engines, publish gate"
requires-python = ">=3.10"
dependencies = ["httpx>=0.28.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/execution_adapters"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
